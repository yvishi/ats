spec_version: 1
name: atc_env
version: 2.0.0
description: >
  Realistic air traffic control disruption recovery benchmark with multi-agent
  AMAN/DMAN coordination. Single-agent and multi-agent modes supported.
  Features self-play adversarial generator, Snorkel-style supervisor with
  rotating preference profiles, and GRPO-trainable cooperative controllers.
type: space
runtime: fastapi
app: server.app:app
port: 8000
tags:
- openenv
- air-traffic-control
- optimization
- multi-agent
- self-play
- grpo
- aman
- dman

# ── Single-agent mode ──────────────────────────────────────────────────────────
action_space: models:ATCOptimizationAction
observation_space: models:ATCOptimizationObservation

# ── Multi-agent mode ───────────────────────────────────────────────────────────
multi_agent:
  enabled: true
  mode: cooperative_competitive
  agents:
    - role: AMAN
      description: Arrival Manager — sequences inbound flights, manages wake turbulence separation
      action_space: multi_agent.models:AMANAction
      observation_space: multi_agent.models:MultiAgentObservation
    - role: DMAN
      description: Departure Manager — schedules outbound flights, enforces ATFM network slots
      action_space: multi_agent.models:DMANAction
      observation_space: multi_agent.models:MultiAgentObservation
    - role: GENERATOR
      description: Adversarial self-play agent — mutates tasks to challenge controllers
      action_space: multi_agent.models:GeneratorAction
      observation_space: multi_agent.models:MultiAgentObservation
    - role: SUPERVISOR
      description: Simulated expert with rotating preference profiles (Snorkel-style)
      action_space: null
      observation_space: multi_agent.models:MultiAgentObservation
  negotiation_rounds: 3
  protocol: BID -> NEGOTIATE -> FINAL
  shared_runways: true
  emergency_broadcast: true

# ── Graders ───────────────────────────────────────────────────────────────────
graders:
  single_agent:
    module: graders:GatedCompositeGrader
  multi_agent:
    - module: graders:MultiAgentCoordinationGrader
      weight: 0.40
    - module: graders:GatedCompositeGrader
      weight: 0.45
    - module: graders:LLMSupervisorGrader
      weight: 0.15

# ── Tasks ─────────────────────────────────────────────────────────────────────
tasks:
- id: delhi_monsoon_recovery_easy
  difficulty: easy
  description: Delhi IGI airport, monsoon season, 12 flights, VVIP slot constraint
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 10
  multi_agent_max_rounds: 3

- id: mumbai_bank_balance_medium
  difficulty: medium
  description: Mumbai CSIA, runway bank sequence, mixed cargo/passenger, 15 flights
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 14
  multi_agent_max_rounds: 3

- id: bengaluru_irrops_hard
  difficulty: hard
  description: >
    Bengaluru KIA, dual-runway IRROPS (09L/09R), emergency MED001 arrival +
    MED208 medical departure, ATFM constraints, 18 flights
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 18
  multi_agent_max_rounds: 3

- id: hyderabad_cargo_crunch_medium_hard
  difficulty: hard
  description: Hyderabad RGIA, cargo priority, peak hour crunch, 20 flights
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 20
  multi_agent_max_rounds: 3

# ── Training ──────────────────────────────────────────────────────────────────
training:
  algorithm: GRPO
  framework: unsloth + trl
  base_model: Qwen/Qwen2.5-7B-Instruct
  colab_compatible: true
  vram_requirement: 16GB
  lora_rank: 16
  script: training/train_grpo.py
  eval_script: training/eval.py
  reward_functions: training/reward_functions.py
