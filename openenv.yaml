spec_version: 1
name: atc_env
version: 3.0.0
description: >
  Multi-agent RLVE benchmark for air traffic control disruption recovery.
  AMAN and DMAN controllers coordinate via a 3-round BID/NEGOTIATE/FINAL
  protocol over shared runways. An adversarial ChallengeGenerator applies
  EMA-based curriculum mutation. A SupervisorAgent with 5 rotating preference
  profiles (safety / throughput / fuel / emergency / fairness) provides
  grounded dense reward. Trained with GRPO + Unsloth 4-bit QLoRA on Colab T4.
type: space
runtime: fastapi
app: server.app:app
port: 8000
tags:
- openenv
- air-traffic-control
- multi-agent
- rlve
- grpo
- cooperative-competitive
- self-play
- aman
- dman
- curriculum-learning

# ── Primary interface (OpenEnv-compliant) ─────────────────────────────────────
action_space: atc_env.models:ATCAction
observation_space: atc_env.models:ATCObservation
state_space: atc_env.models:ATCState

# ── Multi-agent configuration ─────────────────────────────────────────────────
multi_agent:
  enabled: true
  mode: cooperative_competitive
  agents:
    - role: AMAN
      description: Arrival Manager — sequences inbound flights, manages wake turbulence separation
      action_space: multi_agent.models:AMANAction
      observation_space: multi_agent.models:MultiAgentObservation
    - role: DMAN
      description: Departure Manager — schedules outbound flights, enforces ATFM network slots
      action_space: multi_agent.models:DMANAction
      observation_space: multi_agent.models:MultiAgentObservation
    - role: GENERATOR
      description: Adversarial self-play agent — mutates tasks via EMA curriculum to challenge controllers
      action_space: multi_agent.models:GeneratorAction
      observation_space: multi_agent.models:MultiAgentObservation
    - role: SUPERVISOR
      description: >
        Expert with rotating preference profiles (safety_strict / throughput_max /
        fuel_economy / emergency_priority / fairness_balanced)
      action_space: null
      observation_space: multi_agent.models:MultiAgentObservation
  negotiation_rounds: 3
  protocol: BID -> NEGOTIATE -> FINAL
  shared_runways: true
  emergency_broadcast: true

# ── Reward design ─────────────────────────────────────────────────────────────
reward:
  type: potential_based_shaping  # Ng et al. 1999 — preserves optimal policy
  roles:
    AMAN:
      components: [delay_efficiency, emergency_score, coverage, counterfactual_advantage,
                   theory_of_mind_bonus, supervisor_alignment, rationale_quality, json_format]
      hard_gates:
        conflict_free: {cap: 0.30, condition: "conflict_count > 0"}
        emergency:     {cap: 0.40, condition: "emg_miss > 0"}
        coverage_floor: {penalty: -0.30, condition: "coverage < 0.50"}
    DMAN:
      components: [delay_efficiency, atfm_compliance, emergency_score, coverage,
                   counterfactual_advantage, theory_of_mind_bonus, supervisor_alignment,
                   rationale_quality, json_format]
      hard_gates:
        conflict_free: {cap: 0.30, condition: "conflict_count > 0"}
        emergency:     {cap: 0.40, condition: "emg_miss > 0"}
        coverage_floor: {penalty: -0.30, condition: "coverage < 0.50"}
    GENERATOR:
      components: [challenge_score, solvability_bonus]
    SUPERVISOR:
      components: [preference_alignment, calibration_bonus]

# ── Graders ───────────────────────────────────────────────────────────────────
graders:
  primary:
    - module: graders:MultiAgentCoordinationGrader
      weight: 0.40
    - module: graders:GatedCompositeGrader
      weight: 0.45
    - module: graders:LLMSupervisorGrader
      weight: 0.15

# ── Tasks ─────────────────────────────────────────────────────────────────────
tasks:
- id: delhi_monsoon_recovery_easy
  difficulty: easy
  description: Delhi IGI airport, monsoon season, 12 flights, VVIP slot constraint
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 10
  multi_agent_max_rounds: 3

- id: mumbai_bank_balance_medium
  difficulty: medium
  description: Mumbai CSIA, runway bank sequence, mixed cargo/passenger, 15 flights
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 14
  multi_agent_max_rounds: 3

- id: bengaluru_irrops_hard
  difficulty: hard
  description: >
    Bengaluru KIA, dual-runway IRROPS (09L/09R), emergency MED001 arrival +
    MED208 medical departure, ATFM constraints, 18 flights
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 18
  multi_agent_max_rounds: 3

- id: hyderabad_cargo_crunch_medium_hard
  difficulty: hard
  description: Hyderabad RGIA, cargo priority, peak hour crunch, 20 flights
  grader:
    type: programmatic
    module: graders:GatedCompositeGrader
  multi_agent_grader:
    module: graders:grade_multi_agent
  max_steps: 20
  multi_agent_max_rounds: 3

# ── Training ──────────────────────────────────────────────────────────────────
training:
  algorithm: GRPO
  n_generations: 4
  kl_coeff: 0.01
  framework: unsloth + trl
  base_model: Qwen/Qwen2.5-7B-Instruct
  colab_compatible: true
  vram_requirement: 16GB
  lora_rank: 16
  script: training/train_grpo.py
  reward_functions: training/reward_functions.py
